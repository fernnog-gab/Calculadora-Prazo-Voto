<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Prazos | Dias Úteis</title>

    <!-- Configurações de Favicon -->
    <link rel="icon" type="image/x-icon" href="imagens/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="imagens/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="imagens/favicon-16x16.png">
    <link rel="apple-touch-icon" href="imagens/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="imagens/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="imagens/android-chrome-512x512.png">

    <!-- Chamada do arquivo CSS Externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Ícone SVG de Lâmpada para alternar o tema -->
    <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="Alternar Modo Claro / Conforto Visual" title="Ativar Tema Claro (Conforto Visual)">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2.25c-3.17 0-5.75 2.58-5.75 5.75 0 1.94 1.05 3.65 2.53 4.71.4.29.64.76.64 1.25v1.29c0 .96.79 1.75 1.75 1.75h1.66c.96 0 1.75-.79 1.75-1.75v-1.29c0-.49.24-.96.64-1.25 1.48-1.06 2.53-2.77 2.53-4.71 0-3.17-2.58-5.75-5.75-5.75zm1.5 16.5h-3v.75c0 .41.34.75.75.75h1.5c.41 0 .75-.34.75-.75v-.75zm-1.5 3c-.83 0-1.5-.67-1.5-1.5h3c0 .83-.67 1.5-1.5 1.5z"/>
        </svg>
    </button>

    <div class="container">
        <!-- Card Principal de Input e Atalhos -->
        <div class="input-card">
            <h1>Calcular Prazo em Dias Úteis</h1>
            
            <!-- Seletor de Retroatividade -->
            <div class="offset-section">
                <span class="section-label">O prazo iniciou:</span>
                <div class="offset-group" id="offsetGroup">
                    <button class="offset-btn active" data-offset="0">Hoje</button>
                    <button class="offset-btn" data-offset="1">-1 Dia</button>
                    <button class="offset-btn" data-offset="2">-2 Dias</button>
                    <button class="offset-btn" data-offset="3">-3 Dias</button>
                    <button class="offset-btn" data-offset="4">-4 Dias</button>
                    <button class="offset-btn" data-offset="5">-5 Dias</button>
                </div>
            </div>

            <!-- Atalhos Rápidos com Prazos Duplos -->
            <div class="shortcuts-grid">

                <button class="shortcut-card" onclick="calculateDates(6, 8)">
                    <span class="sc-title">ED</span>
                    <div class="sc-badges">
                        <span class="badge badge-ficto">6d ficto</span>
                        <span class="badge badge-real">8d real</span>
                    </div>
                </button>

                <button class="shortcut-card" onclick="calculateDates(7, 10)">
                    <span class="sc-title">RORSum</span>
                    <div class="sc-badges">
                        <span class="badge badge-ficto">7d ficto</span>
                        <span class="badge badge-real">10d real</span>
                    </div>
                </button>

                <button class="shortcut-card" onclick="calculateDates(25, 30)">
                    <span class="sc-title">Originárias</span>
                    <div class="sc-badges">
                        <span class="badge badge-ficto">25d ficto</span>
                        <span class="badge badge-real">30d real</span>
                    </div>
                </button>

                <button class="shortcut-card" onclick="calculateDates(50, 60)">
                    <span class="sc-title">Demais</span>
                    <div class="sc-badges">
                        <span class="badge badge-ficto">50d ficto</span>
                        <span class="badge badge-real">60d real</span>
                    </div>
                </button>

            </div>

            <!-- Painel de Cálculo Manual — Recolhido por Padrão
                 NOTA: <summary> usa estrutura própria de spans para
                 evitar conflito com o seletor CSS .divider existente. -->
            <details class="manual-collapse" id="manualCollapse">
                <summary class="manual-summary">
                    <span class="summary-line"></span>
                    <span class="summary-text">calcular prazo manual</span>
                    <span class="summary-line"></span>
                </summary>

                <div class="collapse-content">
                    <div class="manual-inputs">

                        <div class="manual-field">
                            <label for="fictoInput" class="field-label badge-ficto-label">
                                Prazo Ficto (dias úteis)
                            </label>
                            <input type="number" id="fictoInput"
                                   placeholder="Ex: 15" min="1" inputmode="numeric">
                        </div>

                        <div class="manual-field">
                            <label for="realInput" class="field-label badge-real-label">
                                Prazo Real (dias úteis)
                            </label>
                            <input type="number" id="realInput"
                                   placeholder="Opcional" min="1" inputmode="numeric">
                        </div>

                    </div>
                    <button class="calc-btn" onclick="calculateDates(null, null, true)">
                        Calcular
                    </button>
                </div>
            </details>

        </div>
        <!-- FIM DO CARD PRINCIPAL -->


        <!-- =========================================================
             CARD DE RESULTADO: Dois blocos com cores distintas
             ========================================================= -->
        <div class="result-card" id="resultCard" aria-live="polite">

            <div class="dual-results" id="dualResults">

                <!-- Bloco Ficto (Assistentes) -->
                <div class="result-box box-ficto">
                    <div class="result-box-label">Prazo Ficto</div>
                    <div class="result-box-sublabel">Assistentes</div>
                    <div class="result-date" id="fictoDisplay">--/--/----</div>
                </div>

                <!-- Bloco Real (Gestor) -->
                <div class="result-box box-real" id="boxReal">
                    <div class="result-box-label">Prazo Real</div>
                    <div class="result-box-sublabel">Gestor</div>
                    <div class="result-date" id="realDisplay">--/--/----</div>
                </div>

            </div>

            <div class="result-sub" id="calculationInfo"></div>

            <div class="holidays-list" id="holidaysSection" style="display: none;">
                <div class="holidays-title">Feriados Desconsiderados:</div>
                <ul class="holidays-items" id="holidaysList"></ul>
            </div>

        </div>
        <!-- FIM DO CARD DE RESULTADO -->

        <!-- Painel de Citação Aleatória -->
        <div class="quote-panel" id="quotePanel" aria-hidden="true" title="Dê um duplo clique para ler uma nova frase">
            <!-- Injetado via JS -->
        </div>
    </div>

    <!-- Chamada do arquivo JavaScript Externo -->
    <script src="script.js"></script>
</body>
</html>
